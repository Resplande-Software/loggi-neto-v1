<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="18" fill="#1a3370"/>
  <!-- Letter L (white/light for contrast, with orange accent) -->
  <text
    x="10"
    y="78"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="68"
    fill="#ffffff"
    letter-spacing="-4"
  >L</text>
  <!-- Letter N in orange -->
  <text
    x="50"
    y="78"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="68"
    fill="#f47920"
  >N</text>
  <!-- Bottom accent line -->
  <rect x="10" y="84" width="80" height="6" rx="3" fill="#f47920" opacity="0.7"/>
</svg>
